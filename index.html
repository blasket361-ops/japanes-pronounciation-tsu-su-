<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>語頭 つ・す 発音トレーナー v4</title>
<style>
:root{--bg:#f7f3ea;--card:#fffdf8;--ink:#2b2118;--muted:#756a5d;--accent:#e67e22;--ok:#2e8b57;--bad:#b84a39;--line:#e2d7c8;--fric:#37a779;--vowel:#f2c14e;--other:#c7b8a8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}.wrap{max-width:980px;margin:0 auto;padding:24px}h1{margin:0 0 8px;font-size:28px}h2{margin:0 0 12px;font-size:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 2px 8px #0000000a}.small{font-size:13px;color:var(--muted);line-height:1.7}button{border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;margin:4px;background:#2f2a24;color:white}button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}button.warn{background:var(--bad)}button:disabled{opacity:.45;cursor:not-allowed}.bigWord{text-align:center;font-size:56px;font-weight:900;letter-spacing:.08em;margin:10px 0}.pair{text-align:center;font-size:22px;color:var(--muted)}.result{font-size:21px;font-weight:800;padding:14px;border-radius:14px;background:white;border:1px solid var(--line)}.ok{color:var(--ok)}.bad{color:var(--bad)}canvas{width:100%;height:300px;background:white;border:1px solid var(--line);border-radius:14px}.bar{height:64px;background:white;border:1px solid var(--line);border-radius:14px;display:flex;overflow:hidden}.seg{display:flex;align-items:center;justify-content:center;text-align:center;font-size:12px;font-weight:800;border-right:2px solid white;min-width:4px}.fric{background:var(--fric)}.vowel{background:var(--vowel)}.other{background:var(--other)}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.metric{background:white;border:1px solid var(--line);border-radius:14px;padding:12px}.metric b{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}.diagnosis{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;font-size:15px;line-height:1.75}.diagnosis h3{font-size:17px;margin:8px 0 4px}.pill{display:inline-block;border-radius:999px;padding:4px 10px;background:#eee;margin:2px;font-size:12px}.hidden{display:none}@media (max-width:640px){.wrap{padding:12px}h1{font-size:22px}.card{padding:14px;border-radius:16px;margin:10px 0}button{width:100%;margin:5px 0;padding:14px 12px;font-size:17px;border-radius:14px}.bigWord{font-size:48px;margin:8px 0}.pair{font-size:18px}.result{font-size:18px;padding:12px}.diagnosis{font-size:14px;padding:12px}canvas{height:250px}.bar{height:72px}.metrics{grid-template-columns:1fr 1fr;gap:8px}}@media (max-width:380px){.metrics{grid-template-columns:1fr}.bigWord{font-size:42px}}
</style>

<body>
<div class="wrap">
<h1>語頭 つ・す 発音トレーナー v4</h1>
<p class="small">語の最初に「す／つ」が来るミニマルペア専用です。スマホでは語頭の閉鎖と録音前の無音を区別しにくいため、閉鎖時間は判定に使いません。後続母音を摩擦時間に含めないよう、最初の摩擦候補だけを短く切って判定します。閉鎖時間は使いません。</p>
<section class="card">
<div class="small">問題</div>
<div class="bigWord" id="targetWord">---</div>
<div class="pair" id="pairInfo"></div>
<div><button id="nextBtn">次の問題</button><button id="recordBtn">録音開始</button><button id="stopBtn" class="warn" disabled>手動停止</button><button id="retryBtn" class="secondary" disabled>同じ問題をやり直す</button></div>
<p id="status" class="small">ページを開くと自動で最初の問題を表示します。</p>
<div id="practiceResult" class="result hidden"></div>
</section>
<section class="card"><h2>波形：語頭の対象部分</h2><canvas id="waveCanvas" width="1200" height="420"></canvas></section>
<section class="card"><h2>音の構造</h2><div class="bar" id="segmentBar"><div class="seg other" style="width:100%">録音後に表示</div></div><p class="small"><span class="pill">緑＝摩擦候補</span><span class="pill">黄＝母音/有声部</span><span class="pill">茶＝その他</span></p></section>
<section class="card"><h2>判定に使った数値</h2><div class="metrics">
<div class="metric"><b>立ち上がり係数</b><span id="mRise">-</span></div>
<div class="metric"><b>摩擦時間</b><span id="mFric">-</span></div>
<div class="metric"><b>破裂候補</b><span id="mBurst">-</span></div>
<div class="metric"><b>高域比率 5–9kHz</b><span id="mHigh">-</span></div>
<div class="metric"><b>スペクトル重心</b><span id="mCentroid">-</span></div>
<div class="metric"><b>推定</b><span id="mGuess">-</span></div>
</div></section>
</div>
<script>
"use strict";
const pairs=[{su:"すり",tsu:"つり"},{su:"すかう",tsu:"つかう"},{su:"すける",tsu:"つける"},{su:"すぎ",tsu:"つぎ"},{su:"すめる",tsu:"つめる"}];
const $=id=>document.getElementById(id);let current=null,lastTwoTypes=[],stream=null,recorder=null,chunks=[],audioCtx=null,analyser=null,vadInterval=null,heardVoice=false,silenceStart=null;
$("nextBtn").onclick=nextQuestion;$("recordBtn").onclick=()=>startRecording();$("stopBtn").onclick=()=>stopRecording();$("retryBtn").onclick=retryQuestion;window.addEventListener("load",()=>nextQuestion());
function nextQuestion(){let q=null;for(let i=0;i<100;i++){const p=pairs[Math.floor(Math.random()*pairs.length)];const type=Math.random()<0.5?"su":"tsu";if(lastTwoTypes.length>=2&&lastTwoTypes[0]===type&&lastTwoTypes[1]===type)continue;q={pair:p,type,word:p[type],expected:type};break}if(!q){const p=pairs[Math.floor(Math.random()*pairs.length)];q={pair:p,type:"su",word:p.su,expected:"su"}}current=q;lastTwoTypes.push(q.type);if(lastTwoTypes.length>2)lastTwoTypes.shift();$("targetWord").textContent=q.word;$("pairInfo").textContent=q.pair.su+" ／ "+q.pair.tsu;$("status").textContent="録音開始を押して、表示語を1回発音してください。";$("practiceResult").classList.add("hidden");$("retryBtn").disabled=true;clearVisuals()}
function retryQuestion(){$("practiceResult").classList.add("hidden");$("status").textContent="同じ問題をもう一度録音してください。";clearVisuals()}
async function startRecording(){try{chunks=[];heardVoice=false;silenceStart=null;if(!stream){stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})}if(audioCtx&&audioCtx.state==="suspended")await audioCtx.resume();let options={};if(MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported("audio/webm"))options={mimeType:"audio/webm"};else if(MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported("audio/mp4"))options={mimeType:"audio/mp4"};recorder=new MediaRecorder(stream,options);recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data)};recorder.onstop=async()=>{stopVAD();setRecordingButtons(false);$("status").textContent="自動停止しました。判定中...";const blob=new Blob(chunks,{type:recorder.mimeType||"audio/webm"});await analyzeBlob(blob)};recorder.start();setRecordingButtons(true);startVAD();$("status").textContent="録音中です。発音後、約0.8秒の無音で自動停止します。";$("practiceResult").classList.add("hidden")}catch(err){alert("マイクを開始できませんでした: "+err.message)}}
function setRecordingButtons(isRec){$("recordBtn").disabled=isRec;$("stopBtn").disabled=!isRec;$("nextBtn").disabled=isRec}
function startVAD(){audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const source=audioCtx.createMediaStreamSource(stream);analyser=audioCtx.createAnalyser();analyser.fftSize=1024;source.connect(analyser);const buf=new Float32Array(analyser.fftSize),threshold=0.018,silenceMs=800;stopVAD();vadInterval=setInterval(()=>{if(!analyser)return;analyser.getFloatTimeDomainData(buf);let sum=0;for(const x of buf)sum+=x*x;const rms=Math.sqrt(sum/buf.length),now=performance.now();if(rms>threshold){heardVoice=true;silenceStart=null}else if(heardVoice){if(silenceStart===null)silenceStart=now;if(now-silenceStart>silenceMs)stopRecording()}},80)}
function stopVAD(){if(vadInterval)clearInterval(vadInterval);vadInterval=null}
function stopRecording(){stopVAD();if(recorder&&recorder.state==="recording")recorder.stop()}
async function analyzeBlob(blob){try{const arrayBuffer=await blob.arrayBuffer();const ctx=new(window.AudioContext||window.webkitAudioContext)();const audioBuffer=await ctx.decodeAudioData(arrayBuffer);const samples=audioBuffer.getChannelData(0);const sr=audioBuffer.sampleRate;const framesAll=makeFrames(samples,sr);const frames=trimFramesKeepStart(framesAll);const target=findInitialTargetRange(frames,samples,sr);const targetFrames=frames.filter(f=>f.start>=target.start&&f.end<=target.end);const classified=classifyHeadFrames(targetFrames.length?targetFrames:frames);const segments=mergeSegments(classified);const metrics=computeHeadMetrics(samples,sr,classified,segments,target);drawWaveRegion(samples,sr,target.start,target.end);drawSegments(segments);showMetrics(metrics);const guess=guessHeadSuTsu(metrics);$("mGuess").textContent=guess.label;const ok=(current.expected==="su"&&guess.type==="su")||(current.expected==="tsu"&&guess.type==="tsu");const div=$("practiceResult");div.classList.remove("hidden");div.innerHTML=(ok?`<span class="ok">○ 正解寄り</span>：${guess.label}`:`<span class="bad">△ 要確認</span>：${guess.label}`)+buildDiagnosisHTML(guess,metrics);$("status").textContent="判定が終わりました。";$("retryBtn").disabled=false}catch(err){console.error(err);$("status").textContent="解析エラー："+(err.message||err);$("retryBtn").disabled=false}}
function makeFrames(samples,sr){const frameMs=5;const size=Math.max(96,Math.floor(sr*frameMs/1000));const frames=[];for(let i=0;i+size<samples.length;i+=size){let energy=0,zc=0,diffEnergy=0,prev=samples[i]||0;for(let j=0;j<size;j++){const x=samples[i+j]||0;energy+=x*x;const d=x-prev;diffEnergy+=d*d;prev=x;if(j>0&&Math.sign(samples[i+j])!==Math.sign(samples[i+j-1]))zc++}energy=Math.sqrt(energy/size);diffEnergy=Math.sqrt(diffEnergy/size);const highProxy=energy>0?diffEnergy/energy:0;frames.push({start:i/sr,end:(i+size)/sr,i0:i,i1:i+size,energy,diffEnergy,highProxy,zcr:zc/size,en:0,hp:0,label:"other"})}const maxE=Math.max(...frames.map(f=>f.energy),1e-9);const maxH=Math.max(...frames.map(f=>f.highProxy),1e-9);frames.forEach(f=>{f.en=f.energy/maxE;f.hp=f.highProxy/maxH});return frames}
function trimFramesKeepStart(frames){const active=frames.filter(f=>f.en>0.04);if(!active.length)return frames;const first=frames.indexOf(active[0]);const last=frames.indexOf(active[active.length-1]);return frames.slice(Math.max(0,first-8),Math.min(frames.length,last+5))}
function findInitialTargetRange(frames,samples,sr){const active=frames.find(f=>f.en>0.045);if(!active)return{start:0,end:Math.min(samples.length/sr,0.30)};const start=Math.max(0,active.start-0.025);const end=Math.min(samples.length/sr,start+0.28);return{start,end}}
function classifyHeadFrames(frames){
  return frames.map(f=>{
    // v4:
    // 母音を摩擦として誤認しないため、
    // まず「母音らしさ」を強めに判定する。
    // 母音：エネルギーがあり、ZCRが低く、高域近似も低め。
    const vowel = f.en > 0.12 && f.zcr < 0.075 && (f.hp || 0) < 0.58;
    if(vowel) return {...f,label:"vowel"};

    // 摩擦：ZCRまたは高域近似が高い。ただし母音判定に負ける。
    const fric = (f.zcr > 0.075 && f.en > 0.025) || ((f.hp || 0) > 0.55 && f.en > 0.025);
    if(fric) return {...f,label:"fric"};

    return {...f,label:"other"};
  });
}

function mergeSegments(frames){const segs=[];for(const f of frames){const last=segs[segs.length-1];if(!last||last.label!==f.label)segs.push({label:f.label,start:f.start,end:f.end,frames:[f]});else{last.end=f.end;last.frames.push(f)}}const merged=[];for(const s of segs){const dur=s.end-s.start;if(dur<0.012&&merged.length){merged[merged.length-1].end=s.end;merged[merged.length-1].frames.push(...s.frames)}else merged.push(s)}return merged}
function computeHeadMetrics(samples,sr,frames,segments,target){
  const activeIndex=frames.findIndex(f=>f.en>0.045);
  let rise=0;
  if(activeIndex>=0){
    const before=frames.slice(Math.max(0,activeIndex-5),activeIndex);
    const after=frames.slice(activeIndex,Math.min(frames.length,activeIndex+5));
    const beforeAvg=before.length?before.reduce((a,f)=>a+f.en,0)/before.length:0.01;
    const afterAvg=after.length?after.reduce((a,f)=>a+f.en,0)/after.length:0;
    rise=afterAvg/Math.max(0.01,beforeAvg);
  }

  // v4:
  // 最初の摩擦候補だけを対象にする。
  // その後に母音が出たら、母音以降は摩擦時間に含めない。
  let fricSeg=null;
  const firstFricIndex = segments.findIndex(s=>s.label==="fric");
  if(firstFricIndex>=0){
    fricSeg = segments[firstFricIndex];

    // 長すぎる摩擦は、母音誤認の可能性が高いので上限をかける。
    // 実際の語頭「つ」の摩擦は長くてもだいたい100ms程度を想定。
    if((fricSeg.end-fricSeg.start)>0.13){
      fricSeg = {...fricSeg, end:fricSeg.start+0.13};
    }
  }

  const fric=fricSeg?fricSeg.end-fricSeg.start:0;

  // 破裂候補：有意音開始後20ms以内に、ごく短い高hp/zcrのスパイクがあるか
  let burstScore=0,burstMs=0;
  if(activeIndex>=0){
    const early=frames.slice(activeIndex,Math.min(frames.length,activeIndex+4));
    for(const f of early){
      const score=Math.max(f.zcr/0.12,(f.hp||0)/0.65)*f.en;
      if(score>burstScore)burstScore=score;
    }
    if(burstScore>=0.45)burstMs=5;
  }

  let centroid=0,highRatio=0;
  if(fricSeg){
    const i0=Math.max(0,Math.floor(fricSeg.start*sr));
    const i1=Math.min(samples.length,Math.floor(fricSeg.end*sr));
    const spec=spectrumSummary(samples.slice(i0,i1),sr);
    centroid=spec.centroid;
    highRatio=spec.highRatio;
  }

  return{rise,fric,burstScore,burstMs,centroid,highRatio};
}

function spectrumSummary(x,sr){const N=1024;const buf=new Float32Array(N);for(let i=0;i<N;i++){const w=0.5-0.5*Math.cos(2*Math.PI*i/(N-1));buf[i]=(x[i]||0)*w}const mags=dftMagnitude(buf);let total=0,weighted=0,high=0;for(let k=1;k<mags.length;k++){const freq=k*sr/N;if(freq<1000||freq>9000)continue;const m=mags[k];total+=m;weighted+=freq*m;if(freq>=5000&&freq<=9000)high+=m}return{centroid:total?weighted/total:0,highRatio:total?high/total:0}}
function dftMagnitude(x){const N=x.length,half=N/2;const mags=new Float32Array(half);for(let k=0;k<half;k++){let re=0,im=0;for(let n=0;n<N;n++){const a=-2*Math.PI*k*n/N;re+=x[n]*Math.cos(a);im+=x[n]*Math.sin(a)}mags[k]=Math.sqrt(re*re+im*im)}return mags}
function guessHeadSuTsu(m){
  const rise = m.rise || 0;
  const fricMs = m.fric * 1000;
  const burst = m.burstScore || 0;

  if(fricMs < 8){
    return {
      type:"unknown",
      label:`判定不能（対象音の摩擦が検出できません：摩擦 ${Math.round(fricMs)}ms）`,
      score:0
    };
  }

  let tsuScore = 0;

  // 立ち上がりは補助。
  if(rise >= 2.2) tsuScore += 0.20;
  else if(rise >= 1.6) tsuScore += 0.13;
  else if(rise >= 1.25) tsuScore += 0.06;

  // v4:
  // 摩擦時間は「最初の摩擦候補だけ」なので、長めでも即す扱いにしすぎない。
  if(fricMs <= 75) tsuScore += 0.35;
  else if(fricMs <= 105) tsuScore += 0.22;
  else if(fricMs <= 130) tsuScore += 0.05;
  else tsuScore -= 0.15;

  // 破裂スコアは補助。
  if(burst >= 0.55) tsuScore += 0.25;
  else if(burst >= 0.35) tsuScore += 0.15;
  else if(burst >= 0.25) tsuScore += 0.06;
  else tsuScore -= 0.05;

  // 立ち上がりが高くても、破裂が低く、摩擦がかなり長いなら「す」寄り。
  if(rise >= 1.8 && burst < 0.25 && fricMs >= 120){
    return {
      type:"su",
      label:`す寄り（摩擦が長めで、破裂スコアが弱い：摩擦 ${Math.round(fricMs)}ms）`,
      score:tsuScore
    };
  }

  const hasTsuSupport = (rise >= 1.6) || (burst >= 0.35) || (fricMs <= 75);

  if(tsuScore >= 0.48 && hasTsuSupport){
    return {
      type:"tsu",
      label:`つ寄り（立ち上がり ${rise.toFixed(2)}・摩擦 ${Math.round(fricMs)}ms・破裂スコア ${burst.toFixed(2)}）`,
      score:tsuScore
    };
  }

  if(tsuScore >= 0.34){
    return {
      type:"unknown",
      label:`要確認（中間的：立ち上がり ${rise.toFixed(2)}・摩擦 ${Math.round(fricMs)}ms・破裂 ${burst.toFixed(2)}）`,
      score:tsuScore
    };
  }

  return {
    type:"su",
    label:`す寄り（立ち上がり ${rise.toFixed(2)}・摩擦 ${Math.round(fricMs)}ms・破裂スコア ${burst.toFixed(2)}）`,
    score:tsuScore
  };
}

function showMetrics(m){$("mRise").textContent=m.rise?m.rise.toFixed(2):"-";$("mFric").textContent=Math.round(m.fric*1000)+" ms";$("mBurst").textContent=m.burstScore>=0.45?"あり/強め":(m.burstScore>=0.25?"弱い":"検出なし");$("mCentroid").textContent=m.centroid?Math.round(m.centroid)+" Hz":"-";$("mHigh").textContent=m.highRatio?Math.round(m.highRatio*100)+" %":"-"}
function buildDiagnosisHTML(guess,m){
  const fricMs = Math.round(m.fric * 1000);
  const burstText = m.burstScore >= 0.45
    ? "破裂らしい瞬間が少し見えます。"
    : "破裂は強く検出されていません。ただし語頭版では、破裂は補助材料です。";

  if(fricMs < 8){
    return `<div class="diagnosis">
      <h3>理由</h3>
      <p>摩擦時間：${fricMs}ms（最初の摩擦候補のみ） ／ 立ち上がり係数：${m.rise ? m.rise.toFixed(2) : "-"} ／ 破裂スコア：${m.burstScore.toFixed(2)}</p>
      <p><b>判定不能です。</b> 語頭の「す／つ」の摩擦部分を検出できていません。</p>
      <h3>考えられる原因</h3>
      <p>「つける」の場合、後続の「け」の影響で、語頭の「つ」の摩擦部分をプログラムがうまく拾えていない可能性があります。</p>
      <h3>試し方</h3>
      <p>少し短く、しかし「つ」の摩擦を消さないように発音してみてください。また、まず「つり」「すり」で確認すると原因が分かりやすいです。</p>
    </div>`;
  }

  let explanation = "";
  let advice = "";

  if(guess.type === "tsu"){
    explanation = `摩擦が短めで、立ち上がりまたは破裂スコアにも「つ」らしい特徴があるため、「つ」に近いと判断しました。${burstText}`;
    advice = `この方向でよいです。さらに自然にするには、「すー」と伸ばさず、語頭を短く鋭く出してください。`;
  }else if(guess.type === "su"){
    explanation = `最初の摩擦候補を見た結果、摩擦が長め、または破裂スコアが弱いため、「す」に近いと判断しました。${burstText}`;
    advice = `「つ」を言いたい場合は、語頭を「すー」と長く始めず、摩擦を短くしてください。可能なら最初を少し鋭く出す練習をしてください。`;
  }else{
    explanation = `「つ」と「す」の中間的な特徴です。${burstText}`;
    advice = `もう一度、少し短く鋭く発音してみてください。`;
  }

  return `<div class="diagnosis">
    <h3>理由</h3>
    <p>立ち上がり係数：${m.rise ? m.rise.toFixed(2) : "-"} ／ 摩擦時間：${fricMs}ms（最初の摩擦候補のみ） ／ 破裂スコア：${m.burstScore.toFixed(2)}</p>
    <p><b>語頭版の注意：</b>スマホでは録音前の無音と「つ」の閉鎖を区別しにくいため、閉鎖時間は判定に使っていません。</p>
    <h3>解説</h3>
    <p>${explanation}</p>
    <h3>改善アドバイス</h3>
    <p>${advice}</p>
  </div>`;
}

function drawWaveRegion(samples,sr,startSec,endSec){const c=$("waveCanvas"),g=c.getContext("2d");g.clearRect(0,0,c.width,c.height);g.fillStyle="#fff";g.fillRect(0,0,c.width,c.height);const i0=Math.max(0,Math.floor(startSec*sr));const i1=Math.min(samples.length,Math.floor(endSec*sr));const region=samples.slice(i0,i1);const mid=c.height/2;g.strokeStyle="#e2d7c8";g.lineWidth=1;g.beginPath();g.moveTo(0,mid);g.lineTo(c.width,mid);g.stroke();if(!region.length)return;let peak=0;for(const v of region)peak=Math.max(peak,Math.abs(v));const gain=Math.min(10,Math.max(1.8,0.9/(peak||0.001)));g.strokeStyle="#2b2118";g.lineWidth=1.5;g.beginPath();const step=Math.max(1,Math.ceil(region.length/c.width));for(let x=0;x<c.width;x++){let min=1,max=-1;for(let j=0;j<step;j++){const v=(region[x*step+j]||0)*gain;if(v<min)min=v;if(v>max)max=v}min=Math.max(-1,min);max=Math.min(1,max);g.moveTo(x,mid+min*mid*0.94);g.lineTo(x,mid+max*mid*0.94)}g.stroke();g.fillStyle="#756a5d";g.font="16px system-ui";g.fillText("語頭の最初の約280msを表示（縦方向を自動拡大）",14,26)}
function drawSegments(segs){const bar=$("segmentBar");if(!segs.length){bar.innerHTML='<div class="seg other" style="width:100%">なし</div>';return}const total=segs[segs.length-1].end-segs[0].start||1;const label={fric:"摩擦",vowel:"母音",other:"その他"};bar.innerHTML=segs.map(s=>{const cls=s.label==="fric"?"fric":(s.label==="vowel"?"vowel":"other");const w=Math.max(2,(s.end-s.start)/total*100);const ms=Math.round((s.end-s.start)*1000);return`<div class="seg ${cls}" style="width:${w}%">${label[s.label]||"その他"}<br>${ms}ms</div>`}).join("")}
function clearVisuals(){const c=$("waveCanvas"),g=c.getContext("2d");g.clearRect(0,0,c.width,c.height);$("segmentBar").innerHTML='<div class="seg other" style="width:100%">録音後に表示</div>';["mRise","mFric","mBurst","mCentroid","mHigh","mGuess"].forEach(id=>$(id).textContent="-")}
</script>
